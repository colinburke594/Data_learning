
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}
.hub{max-width:860px;margin:0 auto;padding:1rem 0}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.top-title{font-size:15px;font-weight:500}
.top-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.overall-badge{font-size:13px;font-weight:500;padding:4px 12px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.tab{padding:7px 14px;font-size:13px;font-weight:400;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab:hover{color:var(--color-text-primary)}
.panel{display:none}.panel.active{display:block}
.domain-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.dtab{padding:5px 11px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s}
.dtab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.level-tabs{display:flex;gap:6px;margin-bottom:1rem}
.ltab{padding:5px 14px;font-size:12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s}
.ltab.active{background:var(--color-background-secondary);color:var(--color-text-primary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.card-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px}
.learn-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;font-size:13px;line-height:1.5;color:var(--color-text-secondary)}
.learn-arrow{color:var(--color-text-tertiary);flex-shrink:0;margin-top:2px}
.milestone{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid transparent;transition:all 0.15s;margin-bottom:6px}
.milestone:hover{background:var(--color-background-secondary)}
.milestone.done{background:var(--color-background-success);border-color:var(--color-border-success)}
.checkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:11px;font-weight:500}
.done .checkbox{background:var(--color-text-success);border-color:var(--color-text-success);color:white}
.milestone-text{font-size:13px;line-height:1.5;color:var(--color-text-primary)}
.done .milestone-text{color:var(--color-text-secondary);text-decoration:line-through}
.level-complete{text-align:center;padding:10px;border-radius:var(--border-radius-md);background:var(--color-background-success);border:0.5px solid var(--color-border-success);font-size:13px;color:var(--color-text-success);margin-top:4px;font-weight:500}
.prog-bar-wrap{height:4px;background:var(--color-background-tertiary);border-radius:2px;margin-top:6px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:2px;background:var(--color-text-primary);transition:width 0.3s}
.pct-label{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.domain-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:580px){.domain-grid{grid-template-columns:repeat(2,1fr)}}
.domain-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.domain-card.active{border-color:var(--color-border-primary)}
.domain-emoji{font-size:16px;margin-bottom:4px}
.domain-name{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:6px}
.item-row{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;margin-bottom:6px;transition:all 0.15s}
.item-row:hover{border-color:var(--color-border-secondary)}
.item-row.done{background:var(--color-background-success);border-color:var(--color-border-success)}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:500;margin-bottom:2px}
.done .item-title{text-decoration:line-through;color:var(--color-text-secondary)}
.item-meta{font-size:11px;color:var(--color-text-secondary)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);margin-right:4px}
.free-badge{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filter-btn{padding:4px 10px;font-size:11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:500;line-height:1}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
.save-indicator{font-size:11px;color:var(--color-text-success);opacity:0;transition:opacity 0.4s;margin-left:8px}
.save-indicator.show{opacity:1}
.empty-state{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
.ds-stab-bar{display:flex;gap:4px;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:1px}
.ds-stab{padding:6px 14px;font-size:13px;font-weight:400;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color 0.15s}
.ds-stab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.ds-stab:hover{color:var(--color-text-primary)}
.dirty-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:var(--color-background-primary)}
.dirty-card:hover{border-color:var(--color-border-secondary)}
.dirty-card.done{background:var(--color-background-success);border-color:var(--color-border-success)}
.dirty-card-top{display:flex;gap:10px;align-items:flex-start}
.dirty-card-body{padding:6px 0 0 27px;font-size:11px;color:var(--color-text-secondary);line-height:1.65}
.dirty-issue::before{content:"→ ";color:var(--color-text-tertiary)}
.done .dirty-card-body{opacity:0.6}
</style>

const DOMAIN_MAP={wrangling:"⚙️ Data Wrangling",stats:"📐 Statistics",ml:"🧠 Machine Learning",viz:"📊 Visualization",engineering:"🏗️ Data Engineering",ai:"🤖 AI / LLMs",software:"💻 Software Eng.",business:"🎯 Business"};

let progress={roadmap:{},datasets:{},courses:{}};
let dsTab="all";
let activeDomain="wrangling", activeLevel=1, dsFilter="all", courseFilter="all", courseFree=false;

async function loadProgress(){
  try{
    const r=await window.storage.get("progress-hub-v2");
    if(r&&r.value) progress=JSON.parse(r.value);
  }catch(e){}
  renderAll();
}

async function saveProgress(){
  try{
    await window.storage.set("progress-hub-v2",JSON.stringify(progress));
    const ind=document.getElementById("save-ind");
    if(ind){ind.classList.add("show");setTimeout(()=>ind.classList.remove("show"),1500)}
  }catch(e){}
}

function toggleRoadmap(domain,level,idx){
  const k=`${domain}-${level}-${idx}`;
  progress.roadmap[k]=!progress.roadmap[k];
  saveProgress();
  renderRoadmapContent();
  renderRoadmapStats();
  renderOverall();
}
function toggleDataset(id){
  progress.datasets[id]=!progress.datasets[id];
  saveProgress();
  if(dsTab==="dirty"){renderDirtyStats();renderDirtyList();}
  else{renderDsList();renderDsStats();}
  renderOverall();
}
function toggleCourse(id){
  progress.courses[id]=!progress.courses[id];
  saveProgress();
  renderCourseList();
  renderCourseStats();
  renderOverall();
}

function switchTab(t){
  document.querySelectorAll(".tab").forEach((el,i)=>{el.classList.toggle("active",["roadmap","datasets","courses"][i]===t)});
  document.querySelectorAll(".panel").forEach(el=>{el.classList.toggle("active",el.id===`panel-${t}`)});
}

function switchDsTab(t){
  dsTab=t;
  document.querySelectorAll(".ds-stab").forEach((el,i)=>{el.classList.toggle("active",["all","dirty"][i]===t)});
  document.getElementById("ds-view-all").style.display=t==="all"?"block":"none";
  document.getElementById("ds-view-dirty").style.display=t==="dirty"?"block":"none";
  if(t==="dirty"){renderDirtyStats();renderDirtyList();}
}

function renderDirtyStats(){
  const el=document.getElementById("dirty-stats");if(!el)return;
  const done=DIRTY_DATASETS.filter(d=>progress.datasets[d.id]).length;
  const total=DIRTY_DATASETS.length;
  const domainCounts={};DIRTY_DATASETS.forEach(d=>{domainCounts[d.domain]=(domainCounts[d.domain]||0)+1;});
  const totalRows=DIRTY_DATASETS.reduce((s,d)=>s+d.rows,0);
  el.innerHTML=`
    <div class="stat-card"><div class="stat-num">${done}/${total}</div><div class="stat-lbl">Datasets cleaned</div></div>
    <div class="stat-card"><div class="stat-num">${totalRows.toLocaleString()}</div><div class="stat-lbl">Total rows to clean</div></div>
    <div class="stat-card"><div class="stat-num">${total-done}</div><div class="stat-lbl">Remaining</div></div>
  `;
}

function renderDirtyList(){
  const el=document.getElementById("dirty-list");if(!el)return;
  el.innerHTML=DIRTY_DATASETS.map(d=>{
    const done=!!progress.datasets[d.id];
    const dname=DOMAIN_MAP[d.domain]||d.domain;
    return`<div class="dirty-card${done?" done":""}" onclick="toggleDataset('${d.id}')">
      <div class="dirty-card-top">
        <div class="checkbox" style="flex-shrink:0;margin-top:1px;width:17px;height:17px;border-radius:4px;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;${done?"background:var(--color-text-success);border-color:var(--color-text-success);color:white":""}">${done?"✓":""}</div>
        <div class="item-info">
          <div class="item-title">${d.name}</div>
          <div class="item-meta"><span class="badge">${dname}</span><span class="badge">CSV · ${d.rows.toLocaleString()} rows</span><span class="badge" style="font-family:monospace">${d.file}</span></div>
        </div>
      </div>
      <div class="dirty-card-body">${d.issues.map(i=>`<div class="dirty-issue">${i}</div>`).join("")}</div>
    </div>`;
  }).join("");
}

function totalRoadmapDone(){
  let done=0,total=0;
  DOMAINS.forEach(d=>d.levels.forEach(l=>{total+=l.ready.length;l.ready.forEach((_,i)=>{if(progress.roadmap[`${d.id}-${l.l}-${i}`])done++})}));
  return{done,total};
}

function renderOverall(){
  const rm=totalRoadmapDone();
  const ds=Object.values(progress.datasets).filter(Boolean).length;
  const cr=Object.values(progress.courses).filter(Boolean).length;
  const tot=rm.done+ds+cr, max=rm.total+DATASETS.length+COURSES.length;
  const pct=max>0?Math.round(tot/max*100):0;
  const el=document.getElementById("overall-badge");
  if(el) el.textContent=`Overall: ${pct}% complete`;
}

function renderRoadmapStats(){
  const el=document.getElementById("roadmap-stats");
  if(!el)return;
  const dom=DOMAINS.find(d=>d.id===activeDomain);
  let domDone=0,domTotal=0;
  dom.levels.forEach(l=>{domTotal+=l.ready.length;l.ready.forEach((_,i)=>{if(progress.roadmap[`${dom.id}-${l.l}-${i}`])domDone++})});
  const rm=totalRoadmapDone();
  const lvl=dom.levels.find(l=>l.l===activeLevel);
  let lvlDone=0;lvl.ready.forEach((_,i)=>{if(progress.roadmap[`${dom.id}-${activeLevel}-${i}`])lvlDone++});
  el.innerHTML=`
    <div class="stat-card"><div class="stat-num">${rm.done}/${rm.total}</div><div class="stat-lbl">Total milestones</div></div>
    <div class="stat-card"><div class="stat-num">${domDone}/${domTotal}</div><div class="stat-lbl">${dom.name} domain</div></div>
    <div class="stat-card"><div class="stat-num">${lvlDone}/${lvl.ready.length}</div><div class="stat-lbl">Level ${activeLevel} milestones</div></div>
  `;
}

function renderDomainGrid(){
  const el=document.getElementById("domain-grid");if(!el)return;
  el.innerHTML=DOMAINS.map(d=>{
    let done=0,total=0;
    d.levels.forEach(l=>{total+=l.ready.length;l.ready.forEach((_,i)=>{if(progress.roadmap[`${d.id}-${l.l}-${i}`])done++})});
    const pct=total>0?Math.round(done/total*100):0;
    return`<div class="domain-card${d.id===activeDomain?" active":""}" onclick="selectDomain('${d.id}')">
      <div class="domain-emoji">${d.icon}</div>
      <div class="domain-name">${d.name}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="pct-label">${done}/${total}</div>
    </div>`;
  }).join("");
}

function selectDomain(id){activeDomain=id;activeLevel=1;renderRoadmapPanel();}

function renderLevelTabs(){
  const el=document.getElementById("level-tabs");if(!el)return;
  const dom=DOMAINS.find(d=>d.id===activeDomain);
  el.innerHTML=dom.levels.map(l=>{
    let done=0;l.ready.forEach((_,i)=>{if(progress.roadmap[`${dom.id}-${l.l}-${i}`])done++});
    const pct=Math.round(done/l.ready.length*100);
    return`<button class="ltab${l.l===activeLevel?" active":""}" onclick="selectLevel(${l.l})">${l.label} (${pct}%)</button>`;
  }).join("");
}

function selectLevel(l){activeLevel=l;renderRoadmapContent();renderRoadmapStats();}

function renderRoadmapContent(){
  const el=document.getElementById("level-content");if(!el)return;
  const dom=DOMAINS.find(d=>d.id===activeDomain);
  const lvl=dom.levels.find(l=>l.l===activeLevel);
  const allDone=lvl.ready.every((_,i)=>progress.roadmap[`${dom.id}-${activeLevel}-${i}`]);
  el.innerHTML=`
    <div class="card">
      <div class="card-label">What to learn</div>
      ${lvl.learn.map(l=>`<div class="learn-item"><span class="learn-arrow">→</span><span>${l}</span></div>`).join("")}
    </div>
    <div class="card">
      <div class="card-label">You're ready when...</div>
      ${lvl.ready.map((r,i)=>{
        const done=!!progress.roadmap[`${dom.id}-${activeLevel}-${i}`];
        return`<div class="milestone${done?" done":""}" onclick="toggleRoadmap('${dom.id}',${activeLevel},${i})">
          <div class="checkbox">${done?"✓":""}</div>
          <div class="milestone-text">${r}</div>
        </div>`;
      }).join("")}
      ${allDone?`<div class="level-complete">Level ${activeLevel} complete — move to ${dom.levels.find(l=>l.l===activeLevel+1)?.label||"the next domain"}!</div>`:""}
    </div>
  `;
}

function renderRoadmapPanel(){
  renderRoadmapStats();
  renderDomainGrid();
  renderLevelTabs();
  renderRoadmapContent();
}

function renderDsStats(){
  const el=document.getElementById("ds-stats");if(!el)return;
  const done=Object.values(progress.datasets).filter(Boolean).length;
  const synthetic=["retail","employee","ecommerce","patient","marketing","realestate","student","saas"];
  const synthDone=synthetic.filter(id=>progress.datasets[id]).length;
  el.innerHTML=`
    <div class="stat-card"><div class="stat-num">${done}/${DATASETS.length}</div><div class="stat-lbl">Datasets complete</div></div>
    <div class="stat-card"><div class="stat-num">${synthDone}/8</div><div class="stat-lbl">Synthetic dirty datasets</div></div>
    <div class="stat-card"><div class="stat-num">${DATASETS.length-done}</div><div class="stat-lbl">Remaining</div></div>
  `;
}

function renderDsFilters(){
  const el=document.getElementById("ds-filters");if(!el)return;
  const filters=[{id:"all",label:"All"},
    {id:"wrangling",label:"⚙️ Wrangling"},{id:"stats",label:"📐 Stats"},
    {id:"ml",label:"🧠 ML"},{id:"viz",label:"📊 Viz"},
    {id:"engineering",label:"🏗️ Engineering"},{id:"ai",label:"🤖 AI"},
    {id:"business",label:"🎯 Business"}];
  el.innerHTML=filters.map(f=>`<button class="filter-btn${dsFilter===f.id?" active":""}" onclick="setDsFilter('${f.id}')">${f.label}</button>`).join("")+
    `<button class="filter-btn${!Object.values(progress.datasets).filter(Boolean).length?" active":""}" onclick="setDsFilter('remaining')" style="margin-left:4px">Remaining only</button>`;
}

function setDsFilter(f){dsFilter=f;renderDsList();}

function renderDsList(){
  const el=document.getElementById("ds-list");if(!el)return;
  let list=DATASETS.filter(d=>{
    const df=dsFilter==="all"||dsFilter===d.domain||(dsFilter==="remaining"&&!progress.datasets[d.id]);
    return df;
  });
  if(!list.length){el.innerHTML=`<div class="empty-state">No datasets match this filter</div>`;return;}
  el.innerHTML=list.map(d=>{
    const done=!!progress.datasets[d.id];
    const dname=DOMAIN_MAP[d.domain]||d.domain;
    return`<div class="item-row${done?" done":""}" onclick="toggleDataset('${d.id}')">
      <div class="checkbox">${done?"✓":""}</div>
      <div class="item-info">
        <div class="item-title">${d.name}</div>
        <div class="item-meta"><span class="badge">${dname}</span><span class="badge">${d.tag}</span></div>
      </div>
    </div>`;
  }).join("");
}

function renderCourseStats(){
  const el=document.getElementById("course-stats");if(!el)return;
  const done=Object.values(progress.courses).filter(Boolean).length;
  const freeDone=COURSES.filter(c=>c.free&&progress.courses[c.id]).length;
  const freeTotal=COURSES.filter(c=>c.free).length;
  el.innerHTML=`
    <div class="stat-card"><div class="stat-num">${done}/${COURSES.length}</div><div class="stat-lbl">Courses complete</div></div>
    <div class="stat-card"><div class="stat-num">${freeDone}/${freeTotal}</div><div class="stat-lbl">Free courses done</div></div>
    <div class="stat-card"><div class="stat-num">${COURSES.length-done}</div><div class="stat-lbl">Remaining</div></div>
  `;
}

function renderCourseFilters(){
  const el=document.getElementById("course-filters");if(!el)return;
  const filters=[{id:"all",label:"All"},
    {id:"wrangling",label:"⚙️ Wrangling"},{id:"stats",label:"📐 Stats"},
    {id:"ml",label:"🧠 ML"},{id:"viz",label:"📊 Viz"},
    {id:"engineering",label:"🏗️ Engineering"},{id:"ai",label:"🤖 AI"},
    {id:"software",label:"💻 Software"},{id:"business",label:"🎯 Business"}];
  el.innerHTML=filters.map(f=>`<button class="filter-btn${courseFilter===f.id?" active":""}" onclick="setCourseFilter('${f.id}')">${f.label}</button>`).join("")+
    `<button class="filter-btn${courseFree?" active":""}" onclick="toggleCourseFree()" style="margin-left:4px">Free only</button>`;
}

function setCourseFilter(f){courseFilter=f;renderCourseList();}
function toggleCourseFree(){courseFree=!courseFree;document.querySelectorAll("#course-filters .filter-btn").forEach((b,i)=>i===0?null:null);renderCourseFilters();renderCourseList();}

function renderCourseList(){
  const el=document.getElementById("course-list");if(!el)return;
  let list=COURSES.filter(c=>{
    const df=courseFilter==="all"||courseFilter===c.domain;
    const ff=!courseFree||c.free;
    return df&&ff;
  });
  if(!list.length){el.innerHTML=`<div class="empty-state">No courses match this filter</div>`;return;}
  el.innerHTML=list.map(c=>{
    const done=!!progress.courses[c.id];
    const dname=DOMAIN_MAP[c.domain]||c.domain;
    return`<div class="item-row${done?" done":""}" onclick="toggleCourse('${c.id}')">
      <div class="checkbox">${done?"✓":""}</div>
      <div class="item-info">
        <div class="item-title">${c.name}</div>
        <div class="item-meta"><span class="badge">${dname}</span><span class="badge">${c.platform}</span><span class="badge">${c.tag}</span>${c.free?`<span class="badge free-badge">FREE</span>`:""}</div>
      </div>
    </div>`;
  }).join("");
}

function renderAll(){
  renderRoadmapPanel();
  renderDsStats();renderDsFilters();renderDsList();
  renderCourseStats();renderCourseFilters();renderCourseList();
  renderOverall();
}

loadProgress();
</script>
